# GoReleaser config for shado — cross-platform binaries published to a Homebrew
# tap and a Scoop bucket so `brew install shado` / `scoop install shado` work.
#
# Release flow: push a tag (e.g. `git tag v0.1.0 && git push --tags`); the GitHub
# Actions workflow (.github/workflows/release.yml) runs `goreleaser release`.
#
# NOTE: the darwin/linux backends are not implemented yet (Windows VHDX only), so
# those binaries currently build and run `doctor`/`version`/help but report an
# unsupported backend for create/clone until APFS clonefile / reflink land.
version: 2

project_name: shado

before:
  hooks:
    - go mod tidy

builds:
  - id: shado
    main: .
    binary: shado
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.date={{ .CommitDate }}
    goos: [windows, darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - docs/shado.1

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: popbot-ai
    name: shado

# Homebrew formula -> tap repo popbot-ai/homebrew-tap  (=> `brew install popbot-ai/tap/shado`)
brews:
  - name: shado
    repository:
      owner: popbot-ai
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/popbot-ai/shado"
    description: "Instant copy-on-write workspaces for very large projects"
    license: MIT
    install: |
      bin.install "shado"
      man1.install "docs/shado.1"
    test: |
      system "#{bin}/shado", "version"

# Scoop manifest -> bucket repo popbot-ai/scoop-bucket  (Windows)
scoops:
  - repository:
      owner: popbot-ai
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/popbot-ai/shado"
    description: "Instant copy-on-write workspaces for very large projects"
    license: MIT

# Chocolatey package (Windows)  -> push to chocolatey.org
chocolateys:
  - name: shado
    title: shado
    authors: Benjamin Cooley
    summary: "Instant copy-on-write workspaces for very large projects"
    description: |
      shado creates instant copy-on-write "shadow" workspaces off a frozen base,
      so very large project trees can be worked on in parallel without re-copying.
    project_url: "https://github.com/popbot-ai/shado"
    project_source_url: "https://github.com/popbot-ai/shado"
    docs_url: "https://github.com/popbot-ai/shado/blob/main/README.md"
    bug_tracker_url: "https://github.com/popbot-ai/shado/issues"
    license_url: "https://github.com/popbot-ai/shado/blob/main/LICENSE"
    copyright: "2026 Benjamin Cooley"
    tags: "copy-on-write workspace vhdx perforce game-dev cli"
    release_notes: "https://github.com/popbot-ai/shado/releases/tag/{{ .Tag }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"

# winget manifests -> PR to a fork of microsoft/winget-pkgs
winget:
  - name: shado
    publisher: PopBotAI
    package_identifier: PopBotAI.shado
    short_description: "Instant copy-on-write workspaces for very large projects"
    license: MIT
    homepage: "https://github.com/popbot-ai/shado"
    publisher_url: "https://github.com/popbot-ai"
    commit_author:
      name: popbot-ci
      email: benjcooley@gmail.com
    repository:
      owner: popbot-ai
      name: winget-pkgs          # your fork of microsoft/winget-pkgs
      branch: "shado-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

# Linux packages: .deb (apt) and .rpm (dnf/yum)
nfpms:
  - id: packages
    package_name: shado
    vendor: Benjamin Cooley
    homepage: "https://github.com/popbot-ai/shado"
    maintainer: "Ben Cooley <benjcooley@gmail.com>"
    description: "Instant copy-on-write workspaces for very large projects"
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    section: utils
    contents:
      - src: docs/shado.1
        dst: /usr/share/man/man1/shado.1
      - src: LICENSE
        dst: /usr/share/doc/shado/LICENSE
